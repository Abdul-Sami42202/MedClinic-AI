<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - MedClinic AI</title>
  <link rel="stylesheet" href="/src/css/base.css" />
  <link rel="stylesheet" href="/src/css/components.css" />
  <link rel="stylesheet" href="/src/css/auth.css" />
  <link rel="stylesheet" href="/src/css/interactions.css" />
  <link rel="stylesheet" href="/src/css/utilities.css" />
</head>

<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
        </svg>
        MedClinic AI
      </div>
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to access your dashboard</p>

      <form id="signin-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" />
        </div>
        <div id="auth-error" style="display:none; color:var(--danger); font-size:0.85rem; margin-bottom:1rem;"></div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="signin-btn">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/signup.html">Sign Up</a>
      </div>
    </div>
  </div>
  <script type="module" src="/src/auth.js"></script>
</body>

</html>
